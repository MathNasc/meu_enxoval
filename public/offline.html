<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sem conexão — Meu Enxoval</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0C1B2A;
      color: #E0EAF4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #fff; }
    p  { font-size: 15px; color: #8BACC8; line-height: 1.6; max-width: 320px; margin-bottom: 32px; }
    button {
      background: #1272AA;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">🏠</div>
  <h1>Você está offline</h1>
  <p>Sem conexão com a internet. Verifique sua rede e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
