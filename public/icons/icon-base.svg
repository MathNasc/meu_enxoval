<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C5884"/>
      <stop offset="100%" style="stop-color:#1E90CC"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8F4FF;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Roof -->
  <polygon points="256,110 110,270 402,270" fill="url(#house)"/>
  <!-- Roof cap -->
  <polygon points="256,110 110,270 402,270" fill="white" opacity="0.15"/>
  <!-- Walls -->
  <rect x="148" y="268" width="216" height="142" rx="6" fill="url(#house)"/>
  <!-- Door -->
  <rect x="218" y="320" width="76" height="90" rx="10" fill="#1272AA"/>
  <!-- Door knob -->
  <circle cx="284" cy="368" r="6" fill="#E9A830"/>
  <!-- Left window -->
  <rect x="162" y="292" width="50" height="46" rx="6" fill="#1272AA" opacity="0.85"/>
  <line x1="187" y1="292" x2="187" y2="338" stroke="white" stroke-width="2.5" opacity="0.6"/>
  <line x1="162" y1="315" x2="212" y2="315" stroke="white" stroke-width="2.5" opacity="0.6"/>
  <!-- Right window -->
  <rect x="300" y="292" width="50" height="46" rx="6" fill="#1272AA" opacity="0.85"/>
  <line x1="325" y1="292" x2="325" y2="338" stroke="white" stroke-width="2.5" opacity="0.6"/>
  <line x1="300" y1="315" x2="350" y2="315" stroke="white" stroke-width="2.5" opacity="0.6"/>
  <!-- Chimney -->
  <rect x="310" y="142" width="36" height="70" rx="4" fill="white" opacity="0.85"/>
</svg>